name: Apply P15.30.1 source changes

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'p15.30.1-staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create clean source commit
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p /tmp/p15.30.1-patches
          base64 --decode .pr-staging/p15.30.1-bundle.tar.gz.b64 \
            | tar -xz -C /tmp/p15.30.1-patches

          git fetch origin master
          git checkout --detach origin/master

          git apply /tmp/p15.30.1-patches/01.patch
          git apply /tmp/p15.30.1-patches/02.patch
          git apply /tmp/p15.30.1-patches/03.patch
          git apply /tmp/p15.30.1-patches/04.patch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md src/lua/vm.zig \
            tests/smoke/43_generational_minor.lua \
            tests/smoke/44_gc_restart_pace.lua
          git commit -m "Implement incremental and generational GC and document performance roadmap"
          git push --force origin HEAD:refs/heads/p15.30.1-performance-roadmap

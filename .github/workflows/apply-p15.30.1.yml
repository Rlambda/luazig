name: Apply P15.30.1 source changes

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'p15.30.1-staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create clean source commit
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/p15.30.1.log) 2>&1
          set -x

          cat \
            .pr-staging/bundle.00 \
            .pr-staging/bundle.01 \
            .pr-staging/bundle.02 \
            .pr-staging/bundle.03 \
            .pr-staging/bundle.04 \
            .pr-staging/bundle.05 \
            .pr-staging/bundle.06 \
            .pr-staging/bundle.07 \
            .pr-staging/bundle.08a \
            .pr-staging/bundle.08b \
            .pr-staging/bundle.08c \
            .pr-staging/bundle.08d \
            .pr-staging/bundle.08e \
            .pr-staging/bundle.09 \
            .pr-staging/bundle.10 \
            .pr-staging/bundle.11a \
            .pr-staging/bundle.11b \
            .pr-staging/bundle.11c \
            .pr-staging/bundle.11d \
            .pr-staging/bundle.11e \
            .pr-staging/bundle.11f \
            .pr-staging/bundle.11g \
            .pr-staging/bundle.11h \
            > /tmp/p15.30.1-bundle.b64

          test "$(wc -c < /tmp/p15.30.1-bundle.b64)" -eq 71924
          base64 --decode /tmp/p15.30.1-bundle.b64 > /tmp/p15.30.1-bundle.tar.gz
          echo "072926d37646135b1a2472cfca9206df14265d4fc863f00cc060362b5f943fab  /tmp/p15.30.1-bundle.tar.gz" | sha256sum --check

          mkdir -p /tmp/p15.30.1-patches
          tar -xzf /tmp/p15.30.1-bundle.tar.gz -C /tmp/p15.30.1-patches
          find /tmp/p15.30.1-patches -maxdepth 4 -type f -print

          git fetch origin master
          git checkout --detach origin/master

          mapfile -t patches < <(find /tmp/p15.30.1-patches -type f -name '*.patch' | sort)
          test "${#patches[@]}" -eq 4
          for patch in "${patches[@]}"; do
            git apply --check "$patch"
            git apply "$patch"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md src/lua/vm.zig \
            tests/smoke/43_generational_minor.lua \
            tests/smoke/44_gc_restart_pace.lua
          git diff --cached --stat
          git commit -m "Implement incremental and generational GC and document performance roadmap"
          git push --force origin HEAD:refs/heads/p15.30.1-performance-roadmap

      - name: Upload assembly log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p15.30.1-assembly-log
          path: /tmp/p15.30.1.log
          if-no-files-found: ignore

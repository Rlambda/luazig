name: Create vm2 once

on:
  push:
    branches:
      - docs/readme-performance-roadmap

permissions:
  contents: write

jobs:
  create-vm2:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/readme-performance-roadmap
          fetch-depth: 0

      - name: Create vm2.zig and remove this workflow
        shell: bash
        run: |
          cp src/lua/vm.zig src/lua/vm2.zig
          printf 'test\n' >> src/lua/vm2.zig
          rm .github/workflows/create-vm2-once.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/lua/vm2.zig .github/workflows/create-vm2-once.yml
          git commit -m 'test: add vm2 copy with trailing test line'
          git push origin HEAD:docs/readme-performance-roadmap
